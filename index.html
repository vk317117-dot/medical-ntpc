<!DOCTYPE html>
<html>
<head>
  <title>Occupational Health Check NTPC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial;background:#eef7ff;color:#071b4d}
    .header{background:#003b78;color:white;text-align:center;padding:18px;font-size:24px;font-weight:bold}
    .logo{text-align:center;margin:18px 0}
    .logo img{width:260px;max-width:85%}
    .card{background:white;margin:15px auto;padding:22px;max-width:430px;border-radius:18px;box-shadow:0 6px 20px #cfd8e3}
    label{font-weight:bold;display:block;margin-top:16px;font-size:17px}
    input{width:100%;padding:13px;margin-top:8px;border:1px solid #c9cdd4;border-radius:8px;font-size:16px}
    button{width:100%;padding:14px;margin-top:22px;border:0;border-radius:8px;background:linear-gradient(90deg,#005be8,#009846);color:white;font-size:20px;font-weight:bold}
    .footer{text-align:center;font-size:20px;font-weight:bold;margin:22px;color:#071b4d}
  </style>
</head>
<body>

<div class="header">Occupational Health Check NTPC ( BARH )</div>

<div class="logo">
  <img src="logo.png">
</div>

<div class="card">
  <label>Registration Date</label>
  <input type="date">

  <label>Agency Name</label>
  <input placeholder="Enter Agency Name">

  <label>Department</label>
  <input placeholder="Enter Department">

  <label>EIC Name</label>
  <input placeholder="Enter EIC Name">

  <label>Total Workers</label>
  <input placeholder="Enter Total Workers">

  <label>Supervisor Name</label>
  <input placeholder="Enter Supervisor Name">

  <label>Supervisor Mobile No.</label>
  <input placeholder="Enter Mobile Number">

  <button>Submit</button>
</div>

<div class="footer">☎ Helpline No: 9876543210</div>

</body>
</html>
